name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main"}' \
            https://api.render.com/v1/services/srv-cXXXXXXXXXX/deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

# Note: You need to:
# 1. Get your Render API key from: https://dashboard.render.com/user-settings
# 2. Get your service ID from URL when viewing your service on Render
# 3. Add RENDER_API_KEY to GitHub repo secrets
